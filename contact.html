<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜文字数カウンター</title>
  <meta name="description" content="文字数カウンターへのお問い合わせページです。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4F46E5;
      --bg: #F8F9FF;
      --card: #FFFFFF;
      --text: #1E1B4B;
      --muted: #6B7280;
      --border: #E5E7EB;
    }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }
    .logo { font-weight: 800; font-size: 1.15rem; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--text); }

    main {
      max-width: 560px;
      margin: 48px auto;
      padding: 0 16px 60px;
    }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 36px; line-height: 1.7; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    label .req {
      color: var(--primary);
      margin-left: 4px;
    }

    input, textarea, select {
      width: 100%;
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
    }
    input::placeholder, textarea::placeholder { color: #CBD5E1; }
    textarea { height: 140px; resize: vertical; line-height: 1.7; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #4338CA; }
    .btn-submit:disabled { background: #A5B4FC; cursor: not-allowed; }

    .success {
      display: none;
      background: #D1FAE5;
      border: 1px solid #6EE7B7;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      color: #065F46;
      font-weight: 600;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
      background: var(--card);
    }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">文字数<span>カウンター</span></a>
</header>

<main>
  <h1>お問い合わせ</h1>
  <p class="sub">ご意見・ご要望・不具合のご報告などはこちらからお送りください。通常2〜3営業日以内にご返信します。</p>

  <form id="contactForm" action="https://formspree.io/f/meepwlee" method="POST">
    <div class="form-group">
      <label for="name">お名前<span class="req">*</span></label>
      <input type="text" id="name" name="name" placeholder="山田 太郎" required>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス<span class="req">*</span></label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
      <label for="category">お問い合わせの種類</label>
      <select id="category" name="category">
        <option value="">選択してください</option>
        <option value="bug">不具合の報告</option>
        <option value="request">機能のご要望</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">お問い合わせ内容<span class="req">*</span></label>
      <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください..." required></textarea>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">送信する</button>
  </form>

  <div class="success" id="successMsg">
    送信が完了しました。<br>お問い合わせありがとうございます。
  </div>
</main>

<footer>
  <p>&copy; 2025 文字数カウンター ·
    <a href="/">トップに戻る</a> ·
    <a href="/privacy-policy.html">プライバシーポリシー</a>
  </p>
</footer>

<script>
  const form = document.getElementById('contactForm');
  const btn = document.getElementById('submitBtn');
  const success = document.getElementById('successMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = '送信中...';

    const res = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      form.style.display = 'none';
      success.style.display = 'block';
    } else {
      btn.disabled = false;
      btn.textContent = '送信する';
      alert('送信に失敗しました。時間をおいて再度お試しください。');
    }
  });
</script>

</body>
</html>
